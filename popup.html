<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IanChromeTab 设置</title>
  <link href="tailwind.css" rel="stylesheet">
  <script src="i18n.js"></script>
  <style>
    body {
      background-color: #1a1a1a;
      color: #e0e0e0;
      width: 320px;
      height: 400px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .glass-panel {
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="p-4 flex flex-col gap-4">
  <div class="flex items-center gap-2 mb-2">
    <span class="text-2xl">🧘‍♂️</span>
    <h1 class="text-lg font-semibold">IanChromeTab</h1>
  </div>
  
  <p class="text-sm text-gray-400 mb-4" data-i18n="popupDesc">自动将相同域名的网页归类到标签组，保持浏览器整洁。</p>

  <button id="open-dashboard" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg transition-colors" data-i18n="openDashboardBtn">
    打开中控台 (New Tab)
  </button>
  
  <button id="group-now" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg transition-colors mt-2" data-i18n="groupNowBtn">
    一键整理当前窗口标签
  </button>

  <div class="mt-auto text-xs text-center text-gray-500 pb-2">
    Version 1.0 - Geek Minimalism
  </div>

  <script src="popup.js"></script>
</body>
</html>
